<svg xmlns="http://www.w3.org/2000/svg" width="760" height="260" viewBox="0 0 760 260" role="img" aria-labelledby="title desc">
  <title id="title">GLIDE method overview</title>
  <desc id="desc">A queue and cluster state flow through a Top-K window, feasible action filtering, a GRU policy, selected job dispatching, and fixed First-Fit placement.</desc>
  <defs>
    <linearGradient id="glide" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#138a8a"/>
      <stop offset="1" stop-color="#2d5be3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2d46" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="760" height="260" rx="18" fill="#f8fbff"/>
  <text x="32" y="44" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Learn dispatching, keep placement fixed</text>
  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    <rect x="34" y="88" width="128" height="72" rx="12" fill="#ffffff" stroke="#dce5ea"/>
    <text x="98" y="116" text-anchor="middle" fill="#172033">Waiting Queue</text>
    <text x="98" y="138" text-anchor="middle" fill="#526076">+ Cluster State</text>
    <rect x="202" y="88" width="124" height="72" rx="12" fill="#ffffff" stroke="#dce5ea"/>
    <text x="264" y="116" text-anchor="middle" fill="#172033">Top-K Visible</text>
    <text x="264" y="138" text-anchor="middle" fill="#526076">Queue Window</text>
    <rect x="366" y="88" width="124" height="72" rx="12" fill="#ffffff" stroke="#dce5ea"/>
    <text x="428" y="116" text-anchor="middle" fill="#172033">Feasibility</text>
    <text x="428" y="138" text-anchor="middle" fill="#526076">Filtering</text>
    <rect x="530" y="80" width="168" height="88" rx="14" fill="#eef4ff" stroke="#91a8ee"/>
    <text x="614" y="112" text-anchor="middle" fill="#2d5be3">Queue-aware</text>
    <text x="614" y="136" text-anchor="middle" fill="#2d5be3">GRU Policy</text>
    <rect x="202" y="196" width="124" height="42" rx="12" fill="#ffffff" stroke="#dce5ea"/>
    <text x="264" y="222" text-anchor="middle" fill="#172033">Selected Job</text>
    <rect x="366" y="196" width="168" height="42" rx="12" fill="#ffffff" stroke="#dce5ea"/>
    <text x="450" y="222" text-anchor="middle" fill="#172033">Fixed First-Fit Placement</text>
  </g>
  <g fill="none" stroke="url(#glide)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M162 124 H202"/>
    <path d="M326 124 H366"/>
    <path d="M490 124 H530"/>
    <path d="M614 168 C614 205 560 217 534 217"/>
    <path d="M326 217 H366"/>
  </g>
  <g fill="url(#glide)">
    <path d="M198 118 L208 124 L198 130 Z"/>
    <path d="M362 118 L372 124 L362 130 Z"/>
    <path d="M526 118 L536 124 L526 130 Z"/>
    <path d="M537 211 L527 217 L537 223 Z"/>
    <path d="M362 211 L372 217 L362 223 Z"/>
  </g>
</svg>
