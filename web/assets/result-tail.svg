<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Tail and fairness comparison</title>
  <desc id="desc">GLIDE improves P99 wait, P99 slowdown, max slowdown, CFS max lag, lag over 0.5, and GPU group slowdown gap.</desc>
  <rect width="900" height="300" rx="18" fill="#ffffff"/>
  <text x="32" y="44" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">Tail and Fairness Behavior</text>
  <text x="32" y="72" fill="#718093" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Each marker shows GLIDE's value relative to the best heuristic baseline; lower is better for these diagnostics.</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">
    <line x1="176" y1="112" x2="820" y2="112" stroke="#dce5ea" stroke-width="2"/>
    <line x1="176" y1="148" x2="820" y2="148" stroke="#dce5ea" stroke-width="2"/>
    <line x1="176" y1="184" x2="820" y2="184" stroke="#dce5ea" stroke-width="2"/>
    <line x1="176" y1="220" x2="820" y2="220" stroke="#dce5ea" stroke-width="2"/>
    <text x="32" y="116" fill="#526076">P99 Wait</text>
    <text x="32" y="152" fill="#526076">P99 Slowdown</text>
    <text x="32" y="188" fill="#526076">Max Slowdown</text>
    <text x="32" y="224" fill="#526076">GPU Group Gap</text>
    <circle cx="358" cy="112" r="9" fill="#8da0b8"/>
    <circle cx="342" cy="148" r="9" fill="#8da0b8"/>
    <circle cx="452" cy="184" r="9" fill="#8da0b8"/>
    <circle cx="418" cy="220" r="9" fill="#8da0b8"/>
    <circle cx="302" cy="112" r="10" fill="#138a8a"/>
    <circle cx="284" cy="148" r="10" fill="#138a8a"/>
    <circle cx="242" cy="184" r="10" fill="#138a8a"/>
    <circle cx="236" cy="220" r="10" fill="#138a8a"/>
    <text x="330" y="116" fill="#0e6262">3457.05</text>
    <text x="312" y="152" fill="#0e6262">47.377</text>
    <text x="270" y="188" fill="#0e6262">129.50</text>
    <text x="264" y="224" fill="#0e6262">2.367</text>
    <text x="650" y="266" fill="#8da0b8">best heuristic</text>
    <circle cx="632" cy="262" r="8" fill="#8da0b8"/>
    <text x="788" y="266" fill="#0e6262">GLIDE</text>
    <circle cx="770" cy="262" r="8" fill="#138a8a"/>
  </g>
</svg>
