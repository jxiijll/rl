<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320" role="img" aria-labelledby="title desc">
  <title id="title">CFS lag AUC comparison</title>
  <desc id="desc">GLIDE has the lowest CFS lag AUC at 13.742, compared with 14.073 for slowdown priority and 14.274 for SJF.</desc>
  <rect width="520" height="320" rx="18" fill="#ffffff"/>
  <text x="28" y="42" fill="#172033" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">CFS Lag AUC</text>
  <text x="28" y="68" fill="#718093" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Lower is better</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="800">
    <text x="28" y="124" fill="#526076">SJF</text>
    <rect x="168" y="102" width="300" height="34" rx="7" fill="#8da0b8"/>
    <text x="454" y="124" text-anchor="end" fill="#ffffff">14.274</text>
    <text x="28" y="178" fill="#526076">Slowdown Priority</text>
    <rect x="168" y="156" width="296" height="34" rx="7" fill="#8da0b8"/>
    <text x="450" y="178" text-anchor="end" fill="#ffffff">14.073</text>
    <text x="28" y="232" fill="#0e6262">GLIDE</text>
    <rect x="168" y="210" width="289" height="34" rx="7" fill="#138a8a"/>
    <rect x="168" y="210" width="289" height="34" rx="7" fill="#2d5be3" opacity="0.35"/>
    <text x="443" y="232" text-anchor="end" fill="#ffffff">13.742</text>
  </g>
  <text x="28" y="286" fill="#526076" font-family="Segoe UI, Arial, sans-serif" font-size="14">GLIDE reduces CFS lag AUC by 2.35% vs. Slowdown Priority.</text>
</svg>
